<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f3f4f6;
            --bg-nav: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --border-color: #e5e7eb;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }
        nav {
            background-color: var(--bg-nav);
            border-bottom: 1px solid var(--border-color);
        }
        .max-w-7xl {
            max-width: 80rem;
            margin: 0 auto;
            padding: 0 1rem;
        }
        .nav-content {
            display: flex;
            justify-content: space-between;
            height: 4rem;
        }
        .nav-left, .nav-right {
            display: flex;
            align-items: center;
        }
        .logo {
            display: flex;
            align-items: center;
            margin-right: 2rem;
        }
        .logo svg { width: 32px; height: 32px; fill: #ef4444; }
        .nav-links {
            display: flex;
            gap: 2rem;
            height: 100%;
        }
        .nav-link {
            display: inline-flex;
            align-items: center;
            padding: 0 0.25rem;
            border-bottom: 2px solid #6366f1; /* active state border */
            font-size: 0.875rem;
            font-weight: 500;
            color: #111827;
            text-decoration: none;
        }
        .user-dropdown {
            display: flex;
            align-items: center;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
            gap: 1rem;
        }
        .logout-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
        }
        .logout-btn:hover { color: #111827; }
        header {
            background-color: #ffffff;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }
        .header-content {
            padding: 1.5rem 1rem;
        }
        h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1f2937;
            line-height: 1.2;
        }
        main { padding: 3rem 1rem; }
        .card {
            background-color: #ffffff;
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            overflow: hidden;
            border-bottom: 1px solid var(--border-color);
        }
        .card-body { padding: 1.5rem; }
        .welcome-text { margin-bottom: 1.5rem; color: #374151; font-size: 1rem; }
        
        .profile-info {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            margin-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
        }
        @media (min-width: 640px) {
            .profile-info { grid-template-columns: repeat(2, 1fr); }
        }
        .info-group {
            margin-bottom: 1rem;
        }
        .info-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
            font-weight: 600;
        }
        .info-value {
            font-size: 1rem;
            color: var(--text-main);
        }
    </style>
</head>
<body>
    <nav>
        <div class="max-w-7xl nav-content">
            <div class="nav-left">
                <div class="logo">
                    <svg viewBox="0 0 316 316" xmlns="http://www.w3.org/2000/svg">

                    </svg>
                </div>
                <div class="nav-links">
                    <a href="#" class="nav-link">Dashboard</a>
                </div>
            </div>
            <div class="nav-right">
                <div class="user-dropdown">
                    <span th:text="${profile != null ? profile.nama : 'User'}">User</span>
                    <form th:action="@{/logout}" method="post" style="display: inline;">
                        <button type="submit" class="logout-btn">Log Out</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <header>
        <div class="max-w-7xl header-content">
            <h2>Dashboard</h2>
        </div>
    </header>

    <main class="max-w-7xl">
        <div class="card">
            <div class="card-body">
                <div class="welcome-text">
                    You're logged in! Welcome back, <strong th:text="${profile != null ? profile.nama : 'User'}">User</strong>.
                </div>
                
                <div class="profile-info">
                    <div class="info-group">
                        <div class="info-label">Full Name</div>
                        <div class="info-value" th:text="${profile != null ? profile.nama : '-'}">John Doe</div>
                    </div>
                    <div class="info-group">
                        <div class="info-label">Username</div>
                        <div class="info-value" th:text="${user != null ? user.username : '-'}">johndoe</div>
                    </div>
                    <div class="info-group" style="grid-column: 1 / -1;">
                        <div class="info-label">Address</div>
                        <div class="info-value" th:text="${profile != null ? profile.alamat : '-'}">123 Street</div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
